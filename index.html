<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消防缺失統計系統 (iOS 匯出強化版)</title>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js" onerror="alert('資料庫元件載入失敗，請檢查網路')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" onerror="alert('Excel元件載入失敗')"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" onerror="alert('下載元件載入失敗')"></script>
    
    <style>
        :root { --main-blue: #2980b9; --pdf-blue: #D9EAF7; --border: #A5C2E3; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .input-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 5px solid var(--main-blue); }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .input-item { flex: 1; min-width: calc(50% - 10px); }
        .full-width { flex: 100%; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 12px 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-save { background: #27ae60; grid-column: span 2; }
        .btn-export { background: #2980b9; }
        .btn-pdf { background: #8e44ad; }
        .report-header { background: white; padding: 15px; border: 1px solid var(--border); border-radius: 12px 12px 0 0; text-align: center; }
        .header-fields { display: flex; justify-content: space-between; gap: 10px; font-size: 14px; flex-wrap: wrap; }
        .table-area { background: white; border-radius: 0 0 12px 12px; overflow: hidden; border: 1px solid var(--border); border-top: none; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--pdf-blue); border: 1px solid var(--border); padding: 10px 5px; }
        td { border: 1px solid var(--border); padding: 8px; text-align: center; vertical-align: middle; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        @media print { .input-card, .btn-group, .btn-action { display: none !important; } }
    </style>
</head>
<body>

<div class="input-card">
    <h3>➕ 新增缺失紀錄</h3>
    <div class="input-group">
        <div class="input-item"><label>設備分類-1</label><select id="cat1"></select></div>
        <div class="input-item"><label>設備分類-2</label><select id="cat2"></select></div>
        <div class="input-item"><label>數量</label><input type="number" id="qty" value="1"></div>
        <div class="input-item"><label>單位</label><select id="unit"></select></div>
        <div class="input-item"><label>棟別樓層</label><input type="text" id="floor" placeholder="例: A棟1F"></div>
        <div class="input-item"><label>位置</label><input type="text" id="pos" placeholder="例: 走廊"></div>
        <div class="input-item full-width"><label>缺失說明</label><input type="text" id="issue" placeholder="缺失內容"></div>
        <div class="input-item full-width">
            <label>📷 照片</label>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
            <img id="previewImg" style="max-width: 100%; display: none; margin-top: 10px;">
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-save" id="saveBtn" onclick="saveData()">💾 儲存紀錄</button>
        <button class="btn-export" onclick="exportExcel()">📊 匯出 Excel</button>
        <button class="btn-pdf" onclick="handlePDF()">📄 匯出 PDF</button>
    </div>
</div>

<div class="report-header">
    <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">消防安全設備缺失統計表</div>
    <div class="header-fields">
        <div>檢測日期：<input type="date" id="testDate"></div>
        <div>場所名稱：<input type="text" id="locationName" placeholder="請輸入場所" style="width:120px; border:none; border-bottom:1px solid #000;"></div>
    </div>
</div>

<div class="table-area">
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>編號</th><th>分類1</th><th>分類2</th><th>數量</th><th>樓層</th><th>說明</th><th>位置</th><th>照片</th><th class="btn-action">操作</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script>
    const menuData = {
        cat1: ["滅火器設備", "「室內消防栓設備", "泡沫滅火設備", "自動灑水設備", "「火警自動警報設備", "「緊急廣播設備", "標示設備", "避難器具", "「緊急照明燈設備", "連結送水管", "「消防專用蓄水池", "排煙設備", "緊急電源插座"],
        cat2: ["消防泵浦", "水帶", "泡沫原液槽", "泡沫泵浦", "自動警報逆止閥", "火警總機", "火警指示燈", "手動報警機", "探測器", "廣播主機", "揚聲器", "緊急電話", "避難方向指示燈", "出口燈", "樓層燈", "避難燈具", "出水口及送水口", "採水口", "自動排煙", "手動排煙", "排煙閘門", "緊急電源燈", "滅火器放置盒"],
        unit: ["具", "台", "組", "只", "金", "支", "式", "個", "扇"]
    };

    const db = new Dexie("FireSafetyiOSFix");
    db.version(1).stores({ records: '++id, cat1, cat2, qty, unit, floor, pos, issue, photo' });

    let currentPhoto = "";

    async function init() {
        const fill = (id, arr) => {
            const el = document.getElementById(id);
            arr.forEach(txt => el.add(new Option(txt, txt)));
        };
        fill('cat1', menuData.cat1); fill('cat2', menuData.cat2); fill('unit', menuData.unit);
        document.getElementById('testDate').valueAsDate = new Date();
        render();
    }

    function handlePhoto(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            currentPhoto = event.target.result;
            document.getElementById('previewImg').src = currentPhoto;
            document.getElementById('previewImg').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    async function saveData() {
        try {
            await db.records.add({
                cat1: document.getElementById('cat1').value,
                cat2: document.getElementById('cat2').value,
                qty: document.getElementById('qty').value,
                unit: document.getElementById('unit').value,
                floor: document.getElementById('floor').value,
                pos: document.getElementById('pos').value,
                issue: document.getElementById('issue').value,
                photo: currentPhoto
            });
            document.getElementById('issue').value = "";
            document.getElementById('previewImg').style.display = 'none';
            currentPhoto = "";
            render();
        } catch (e) { alert("儲存失敗：" + e); }
    }

    async function render() {
        const items = await db.records.toArray();
        const html = items.map((r, i) => `
            <tr>
                <td>${i+1}</td><td>${r.cat1}</td><td>${r.cat2}</td><td>${r.qty}${r.unit}</td>
                <td>${r.floor}</td><td>${r.issue}</td><td>${r.pos}</td>
                <td>${r.photo ? `<img src="${r.photo}" class="thumb">` : '無'}</td>
                <td class="btn-action"><button style="background:#e74c3c; padding:5px;" onclick="del(${r.id})">刪</button></td>
            </tr>
        `).join('');
        document.getElementById('dataTable').innerHTML = html;
    }

    async function del(id) { if(confirm('刪除？')) { await db.records.delete(id); render(); } }

    // --- 加強版匯出邏輯 ---
    async function exportExcel() {
        try {
            const items = await db.records.toArray();
            if (items.length === 0) { alert("目前沒有資料可以匯出喔！"); return; }
            
            if (typeof ExcelJS === 'undefined') { alert("Excel 元件尚未載入，請稍等或重新整理"); return; }

            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('缺失表');
            sheet.columns = [ 
                {header:'編號', key:'id', width:5}, {header:'分類1', key:'c1', width:15}, 
                {header:'分類2', key:'c2', width:15}, {header:'數量', width:10},
                {header:'樓層', width:10}, {header:'位置', width:15}, {header:'缺失說明', width:30}
            ];
            
            items.forEach((r, i) => {
                sheet.addRow([i+1, r.cat1, r.cat2, r.qty+r.unit, r.floor, r.pos, r.issue]);
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const locName = document.getElementById('locationName').value || '未命名場所';
            
            // 使用 Blob 下載，這是 iOS Safari 最穩定的方式
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            saveAs(blob, `消防缺失表_${locName}.xlsx`);
            
        } catch (e) {
            alert("匯出 Excel 發生錯誤：" + e.message);
        }
    }

    function handlePDF() {
        // iPhone PDF 匯出其實就是「列印」
        // 在列印預覽介面，用手指「兩指往外張開」縮放預覽圖，就能儲存成 PDF
        alert("提示：即將開啟列印介面。\n在預覽畫面用兩指『往外撥』放大，即可另存為 PDF。");
        window.print();
    }

    window.onload = init;
</script>
</body>
</html>
